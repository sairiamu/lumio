<!doctype html>
<html lang="sw/en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/lumio.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <meta name="application-name" content="Lumio" />
    <meta name="description" content="Illuminate Your Ideas" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <script>
      try {
        const t = localStorage.getItem('lumio_theme') || localStorage.getItem('lumio-theme') || 'lumio-dark'
        document.documentElement.setAttribute('data-theme', t)
      } catch(e) {}
    </script>
    <title>Lumio</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
